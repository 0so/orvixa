[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# DSN is supplied by alembic/env.py via ORVIXA's Settings (postgres_dsn /
# DATABASE_URL env var); this placeholder is unused but kept so `alembic`
# doesn't warn about a missing sqlalchemy.url.
sqlalchemy.url = postgresql://orvixa:orvixa@postgres:5432/orvixa

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
