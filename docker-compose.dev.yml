name: orvixa-dev

# Shared build/env anchor for every Python service (one image, many commands).
x-app: &app
  build:
    context: .
    dockerfile: Dockerfile.dev
  env_file: .env
  environment:
    # override .env hosts for the compose network
    POSTGRES_DSN: postgresql://orvixa:orvixa@postgres:5432/orvixa
    REDIS_URL: redis://redis:6379/0
  volumes:
    - ./src:/app/src
    - ./tests:/app/tests
    - ./alembic:/app/alembic
    - ./alembic.ini:/app/alembic.ini
    - ./data:/app/data

services:
  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    environment:
      POSTGRES_USER: orvixa
      POSTGRES_PASSWORD: orvixa
      POSTGRES_DB: orvixa
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orvixa -d orvixa"]
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  # One-shot: bring the schema to head (Alembic 0002). Every other Python
  # service waits for this to complete so migrations run exactly once.
  migrate:
    <<: *app
    depends_on:
      postgres:
        condition: service_healthy
    command: alembic upgrade head
    restart: "no"

  # Persistent ingestion daemon (feed → candles), looped via the supervisor.
  ingest:
    <<: *app
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: python -m orvixa.runners.daemon ingest
    restart: unless-stopped

  # Persistent analytics daemon (candles → indicators/signals/events/regime).
  analytics:
    <<: *app
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: python -m orvixa.runners.daemon analytics
    restart: unless-stopped

  # Read-only FastAPI service exposing /symbols /signals /regime /policy.
  api:
    <<: *app
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: uvicorn orvixa.api.app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 10s
      timeout: 3s
      retries: 6
    restart: unless-stopped

  # Static SPA dashboard (polls the API every few seconds).
  frontend:
    image: nginx:1.27-alpine
    depends_on:
      - api
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    restart: unless-stopped

  # Optional one-shot historical backfill (idempotent). Enable with:
  #   docker compose -f docker-compose.dev.yml --profile backfill up backfill
  backfill:
    <<: *app
    profiles: ["backfill"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: python -m orvixa.runners.backfill data/real
    restart: "no"

volumes:
  pgdata:
